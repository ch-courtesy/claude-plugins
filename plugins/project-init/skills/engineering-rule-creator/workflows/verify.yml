name: verify

# 검증 에이전트 — GitHub Workflow 백엔드 (anthropics/claude-code-action)
# 작업 에이전트가 sub-태스크 PR을 생성하면 자동 트리거되어 독립 검증·승인·머지를 수행합니다.
# 책임·금지·권한 상세는 rules/engineering/agents.md를 따릅니다.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # main 머지(parent 통합 PR은 사용자 게이트라 별도)
      pull-requests: write  # 리뷰·머지
      issues: write         # sub-태스크 Status·기록 갱신
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt: |
            당신은 검증 에이전트입니다. 본 PR이 sub-태스크 PR이면 독립 검증을 수행합니다. parent 통합 PR(base가 main인 PR)이면 검토만 하고 머지하지 않습니다 (사용자 게이트).

            ## 절차 (sub-태스크 PR)

            1. PR description의 sub-태스크 ID를 식별. 본문을 읽고 완료 기준(DoD)을 추출 — DoD를 1차 기준으로 (검증 계획은 참고).
            2. PR diff를 검토하고 DoD 각 항목을 코드·산출물에 매핑.
            3. 코드 품질·로직 이슈를 file:line inline review comment로 작성. `gh pr review --comment`는 일반 코멘트만 생성하므로 사용하지 말고, GitHub Reviews API(`gh api /repos/<owner>/<repo>/pulls/<pr>/reviews`에 `event`, `body`, `comments: [{path, line, body}]`)로 review와 inline comment를 함께 생성.
            4. 결정:
               - 통과: `gh pr review --approve` → `gh pr merge` → sub-태스크 Status를 `Done`으로 + 통과 결정 기록.
               - 차단: `gh pr review --request-changes` → 차단 기록을 sub-태스크 로그에 추가 → Status를 `In Progress`로 환송.
            5. 재시도 임계: sub-태스크의 차단 기록 누적 ≥ 3이면 Status `Blocked` + parent 에스컬레이션 기록.

            ## 절차 (parent 통합 PR)

            1. base가 main인 경우 사용자 게이트가 머지를 수행하므로 머지하지 않음.
            2. 통합 시점의 conflict·테스트 실패만 점검하고 결과를 inline review로 보고.

            ## 금지

            - 코드 변경 절대 금지. 오타·import·lint 자동수정도 환송.
            - parent 통합 PR 머지.
            - 모든 sub-태스크가 Done이 아닌 상태에서의 통합 진행.

            상세 책임·권한 매트릭스는 rules/engineering/agents.md를 따릅니다.

            ## 차단 카운트

            워크플로우는 stateless이므로 sub-태스크 로그에서 차단 기록 누적 수를 직접 세어 임계 판정에 사용합니다.
